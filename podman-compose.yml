version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: "4000"
    ports:
      - "4000:4000"
    volumes:
      - sqlite_data:/app/data
      - attachment_data:/app/data/attachments
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./Caddyfile.compose:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  sqlite_data:
  attachment_data:
  caddy_data:
  caddy_config:
